services:
  # Backend API
  - type: web
    name: loan-risk-api
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
    healthCheckPath: /

  # Frontend
  - type: web
    name: loan-risk-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    rootDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://loan-risk-api.onrender.com
